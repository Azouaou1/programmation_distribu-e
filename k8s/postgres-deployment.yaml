apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: neurovent-postgres
  labels:
    app: neurovent-postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: neurovent-postgres
  template:
    metadata:
      labels:
        app: neurovent-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:15
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: "neurovent"
            - name: POSTGRES_USER
              value: "neurovent"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: neurovent-secrets
                  key: postgres-password
          volumeMounts:
            - name: postgres-storage
              mountPath: /var/lib/postgresql/data
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "300m"
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "neurovent"]
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: postgres-storage
          persistentVolumeClaim:
            claimName: postgres-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: neurovent-postgres
spec:
  selector:
    app: neurovent-postgres
  ports:
    - protocol: TCP
      port: 5432
      targetPort: 5432
  type: ClusterIP
